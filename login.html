<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Fit</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .login-container {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h2 {
      color: #2E8B57;
      font-weight: 700;
    }

    .form-control {
      padding: 12px 15px;
      margin-bottom: 18px;
      border: 1px solid #ddd;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 0 0.2rem rgba(76, 175, 80, 0.25);
    }

    .btn-login {
      background: linear-gradient(135deg, #4CAF50, #2E8B57);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
    }

    .login-links {
      text-align: center;
      margin-top: 20px;
    }

    .user-role {
      margin-bottom: 20px;
    }

    .role-badge {
      cursor: pointer;
      padding: 8px 15px;
      border: 2px solid #ddd;
      border-radius: 20px;
      margin: 0 5px;
      transition: all 0.3s;
      user-select: none;
    }

    .role-badge.active {
      background-color: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }

    .role-info {
      display: none;
      margin-top: 10px;
      color: #666;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <i class="fas fa-dumbbell"></i> <strong>SMART FIT</strong>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="pricing.html">Pricing</a></li>
        <li class="nav-item"><a class="nav-link" href="workouts.html">Workouts</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
        <li class="nav-item" id="navSignUpItem">
          <a class="btn btn-success ms-2" href="register.html">Sign Up</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your Smart Fit account</p>
    </div>

    <div class="user-role text-center">
      <p class="mb-2">I am a:</p>
      <div class="d-flex justify-content-center flex-wrap gap-2">
        <span class="role-badge active" data-role="member">Member</span>
        <span class="role-badge" data-role="trainer">Trainer</span>
        <span class="role-badge" data-role="admin">Admin</span>
      </div>

      <p id="roleInfo" class="role-info"></p>
    </div>

    <form id="loginForm" novalidate autocomplete="off">
      <input type="hidden" id="role" name="role" value="member">

      <div class="mb-3">
        <input id="email" name="email" type="email" class="form-control" placeholder="Email Address" required>
      </div>

      <div class="mb-3">
        <input id="password" name="password" type="password" class="form-control" placeholder="Password" required>
      </div>

      <button type="submit" class="btn btn-login">Login</button>
    </form>

    <div class="login-links">
      <p class="mb-2" id="signupText">
        Don't have an account?
        <a href="register.html" class="text-decoration-none" style="color: #4CAF50; font-weight: 600;">Sign Up</a>
      </p>

      <p class="mb-0">
        <a href="index.html" class="text-decoration-none" style="color: #666;">← Back to Home</a>
      </p>
    </div>
  </div>
</div>

<footer class="bg-dark text-white py-4">
  <div class="container text-center">
    <p class="mb-0">&copy; 2025 Smart Fit. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const roleBadges = document.querySelectorAll('.role-badge');
  const roleInput = document.getElementById('role');
  const signupText = document.getElementById('signupText');
  const roleInfo = document.getElementById('roleInfo');
  const navSignUpItem = document.getElementById('navSignUpItem');

  function updateRoleUI(role) {
    if (role === 'member') {
      signupText.style.display = 'block';
      navSignUpItem.style.display = 'list-item';
      roleInfo.style.display = 'none';
      roleInfo.textContent = '';
    } else if (role === 'trainer') {
      signupText.style.display = 'none';
      navSignUpItem.style.display = 'none';
      roleInfo.style.display = 'block';
      roleInfo.textContent = 'Trainer accounts are created by the administrator.';
    } else if (role === 'admin') {
      signupText.style.display = 'none';
      navSignUpItem.style.display = 'none';
      roleInfo.style.display = 'block';
      roleInfo.textContent = 'Administrator accounts are managed internally.';
    }
  }

  roleBadges.forEach(badge => {
    badge.addEventListener('click', function () {
      roleBadges.forEach(b => b.classList.remove('active'));
      this.classList.add('active');

      const selectedRole = this.getAttribute('data-role');
      roleInput.value = selectedRole;
      updateRoleUI(selectedRole);
    });
  });

  updateRoleUI('member');

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const role = roleInput.value;

    if (!email || !password) {
      alert("Email & password required");
      return;
    }

    const body = new URLSearchParams();
    body.append("email", email);
    body.append("password", password);
    body.append("role", role);

    try {
      const res = await fetch("./backend/login.php?v=" + Date.now(), {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString(),
        cache: "no-store"
      });

      const text = await res.text();
console.log("RAW RESPONSE:", text);

let data;
try {
  data = JSON.parse(text);
} catch (e) {
  alert("Server error. Check console");
  return;
}

      const ok = (data.ok === true) || (data.status === "success");
      if (!ok) {
        alert(data.message || "Login failed");
        if (data.debug) console.log("LOGIN DEBUG:", data.debug);
        return;
      }

      const displayName = (data.full_name && data.full_name.trim())
        ? data.full_name.trim()
        : email.split("@")[0];

      localStorage.setItem("loggedUserName", displayName);
      localStorage.setItem("loggedUserRole", data.role || role);

      const r = data.role || role;
      if (r === "member")  window.location.href = "dashboard/member/dashboard.html";
      if (r === "trainer") window.location.href = "dashboard/trainer/dashboard.html";
      if (r === "admin")   window.location.href = "dashboard/admin/dashboard.html";

    } catch (err) {
      console.error(err);
      alert("Network/Server error. Console check pannunga.");
    }
  });
</script>

</body>
</html>
