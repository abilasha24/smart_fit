<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plans | Smart Fit Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
  background:linear-gradient(135deg,#c9f7a6,#a0e7a0);
}

/* Sidebar */
.sidebar{
  width:260px;
  min-height:100vh;
  background:#000000;
  color:#ffffff;
}

.sidebar a{
  color:#cbd5e1;
  text-decoration:none;
  display:block;
  padding:10px 14px;
  border-radius:10px;
}

.sidebar a:hover,
.sidebar a.active{
  background:#14532d;
  color:#ffffff;
}

.brand{
  font-weight:700;
  letter-spacing:.5px;
}

/* Cards */
.card-soft{
  border:0;
  border-radius:16px;
  background:#ffffff;
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}

/* Muted text */
.muted{
  color:#4b5563;
}

/* Buttons */
.btn-dark{
  background:#166534;
  border:0;
}

.btn-dark:hover{
  background:#14532d;
}

.btn-outline-dark{
  border-color:#166534;
  color:#166534;
}

.btn-outline-dark:hover{
  background:#166534;
  color:#ffffff;
}

/* Table */
.table thead th{
  font-size:.85rem;
  color:#4b5563;
  font-weight:600;
}

/* Status pills */
.pill{
  border-radius:999px;
  padding:.25rem .6rem;
  font-size:.78rem;
  font-weight:600;
  display:inline-block;
}

.pill-active{
  background:#166534;
  color:#ffffff;
}

.pill-blocked{
  background:#b91c1c;
  color:#ffffff;
}
  </style>
</head>
<body class="p-4">

  <!-- ✅ DEBUG MARKER (to confirm correct file loaded) -->
  <script>
    console.log("SMART FIT PLANS V3 LOADED");
  </script>

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="mb-0">Roles & Plans</h3>
      <small class="text-muted">Manage membership plans (CRUD)</small>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="dashboard.html">← Back</a>
      <button class="btn btn-outline-danger" id="btnLogout">Logout</button>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-lg-4">
      <div class="card p-3">
        <h5 class="mb-3" id="formTitle">Add Plan</h5>

        <input type="hidden" id="planId" value="0"/>

        <!-- ✅ IMPORTANT: Use ONE consistent id: planCode -->
        <label class="form-label">Plan Code</label>
        <input class="form-control mb-2" id="planCode" placeholder="basic / pro / premium / gold"/>

        <label class="form-label">Monthly Price (LKR)</label>
        <input class="form-control mb-2" id="price" type="number" step="0.01" min="0" placeholder="2500"/>

        <label class="form-label">Duration (days)</label>
        <input class="form-control mb-2" id="duration" type="number" min="1" value="30"/>

        <label class="form-label">Status</label>
        <select class="form-select mb-3" id="status">
          <option value="active">active</option>
          <option value="inactive">inactive</option>
        </select>

        <div class="d-flex gap-2">
          <button class="btn btn-success w-100" id="btnSave">Save</button>
          <button class="btn btn-outline-secondary w-100" id="btnClear">Clear</button>
        </div>

        <div class="alert alert-danger mt-3 d-none" id="errBox"></div>
        <div class="alert alert-success mt-3 d-none" id="okBox"></div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card p-3">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <h5 class="mb-0">Plans List</h5>
          <button class="btn btn-outline-primary btn-sm" id="btnRefresh">Refresh</button>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Code</th>
                <th class="text-end">Monthly Price</th>
                <th class="text-end">Duration</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <small class="text-muted">Tip: Use “inactive” to hide a plan without deleting it.</small>
      </div>
    </div>
  </div>

<script>
  // ---- helpers
  const $ = (id)=>document.getElementById(id);
  const showErr = (msg)=>{
    $("errBox").textContent = msg;
    $("errBox").classList.remove("d-none");
    $("okBox").classList.add("d-none");
  };
  const showOk  = (msg)=>{
    $("okBox").textContent = msg;
    $("okBox").classList.remove("d-none");
    $("errBox").classList.add("d-none");
  };
  const clearMsg= ()=>{
    $("errBox").classList.add("d-none");
    $("okBox").classList.add("d-none");
  };

  async function guardAdmin(){
    const r = await fetch("../../backend/check_auth.php", { credentials:"include" });
    const data = await r.json().catch(()=>({ok:false}));
    if (!r.ok || !data.ok || (data.role||"") !== "admin") {
      window.location.href = "../../login.html";
    }
  }

  async function doLogout(){
    await fetch("../../backend/logout.php", { method:"POST", credentials:"include" }).catch(()=>{});
    window.location.href = "../../login.html";
  }

  function fillForm(p){
    $("formTitle").textContent = "Edit Plan";
    $("planId").value = p.id;
    $("planCode").value = (p.code || "");
    $("price").value = p.monthly_price ?? 0;
    $("duration").value = p.duration_days ?? 30;
    $("status").value = (p.status || "active");
    clearMsg();
    window.scrollTo({top:0, behavior:"smooth"});
  }

  function clearForm(){
    $("formTitle").textContent = "Add Plan";
    $("planId").value = 0;
    $("planCode").value = "";
    $("price").value = "";
    $("duration").value = 30;
    $("status").value = "active";
    clearMsg();
  }

  function safeUpperBadge(text){
    const t = (text || "").trim();
    if (!t) return `<span class="badge bg-dark">NO-CODE</span>`;
    return `<span class="badge bg-dark">${t.toUpperCase()}</span>`;
  }

  async function loadPlans(){
    clearMsg();
    const r = await fetch("../../backend/admin_plans_list.php", { credentials:"include" });
    const data = await r.json().catch(()=>({ok:false, message:"Failed"}));
    if (!r.ok || !data.ok) {
      showErr(data.message || "Failed to load plans");
      return;
    }

    const tb = $("tbody");
    tb.innerHTML = "";
    (data.plans || []).forEach(p=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${p.id}</td>
        <td>${safeUpperBadge(p.code)}</td>
        <td class="text-end">LKR ${Number(p.monthly_price||0).toFixed(2)}</td>
        <td class="text-end">${p.duration_days ?? 30}</td>
        <td>${p.status || "active"}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-secondary me-1">Edit</button>
          <button class="btn btn-sm btn-outline-danger">Delete</button>
        </td>
      `;
      const [btnEdit, btnDel] = tr.querySelectorAll("button");
      btnEdit.addEventListener("click", ()=>fillForm(p));
      btnDel.addEventListener("click", ()=>deletePlan(p.id));
      tb.appendChild(tr);
    });
  }

  async function savePlan(){
    clearMsg();

    const id = Number($("planId").value || 0);

    // ✅ IMPORTANT: read from planCode (single source of truth)
    const codeRaw = $("planCode").value;
    const code = (codeRaw || "").trim().toLowerCase();

    // ✅ debug logs to ensure it reads value
    console.log("SAVE CLICKED | planCode value:", codeRaw, "| final:", code);

    const monthly_price = $("price").value;
    const duration_days = $("duration").value;
    const status = $("status").value;

    if (!code) return showErr("Plan code required (example: gold)");

    const fd = new FormData();
    fd.append("id", String(id));
    fd.append("code", code);
    fd.append("monthly_price", String(monthly_price));
    fd.append("duration_days", String(duration_days));
    fd.append("status", String(status));

    const r = await fetch("../../backend/admin_plan_save.php", {
      method:"POST",
      body: fd,
      credentials:"include"
    });

    const data = await r.json().catch(()=>({ok:false, message:"Failed"}));

    // show backend message (and sql_error if your backend sends it)
    if (!r.ok || !data.ok) {
      const extra = data.sql_error ? (" | " + data.sql_error) : "";
      showErr((data.message || "Save failed") + extra);
      return;
    }

    showOk(data.message || "Saved");
    clearForm();
    await loadPlans();
  }

  async function deletePlan(id){
    if(!confirm("Delete this plan?")) return;
    clearMsg();

    const fd = new FormData();
    fd.append("id", String(id));

    const r = await fetch("../../backend/admin_plan_delete.php", {
      method:"POST",
      body: fd,
      credentials:"include"
    });

    const data = await r.json().catch(()=>({ok:false, message:"Failed"}));
    if (!r.ok || !data.ok) return showErr(data.message || "Delete failed");

    showOk("Deleted");
    await loadPlans();
  }

  // events
  $("btnSave").addEventListener("click", savePlan);
  $("btnClear").addEventListener("click", clearForm);
  $("btnRefresh").addEventListener("click", loadPlans);
  $("btnLogout").addEventListener("click", (e)=>{ e.preventDefault(); doLogout(); });

  (async()=>{
    await guardAdmin();
    await loadPlans();
  })();
</script>
</body>
</html>
