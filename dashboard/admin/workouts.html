<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Workouts | Smart Fit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
  margin:0;
  color: var(--text);

  background:
    linear-gradient(rgba(0,0,0,.15), rgba(0,0,0,.15)),
    url("../../assets/img/admin-bg.jpg") center/cover no-repeat fixed;

  background-size: cover;
}

/* Sidebar */
.sidebar{
  width:260px;
  min-height:100vh;
  background:#000000;
  color:#ffffff;
}

.sidebar a{
  color:#cbd5e1;
  text-decoration:none;
  display:block;
  padding:10px 14px;
  border-radius:10px;
}

.sidebar a:hover,
.sidebar a.active{
  background:#14532d;
  color:#ffffff;
}

.brand{
  font-weight:700;
  letter-spacing:.5px;
}

/* Cards */
.card-soft{
  border:0;
  border-radius:16px;
  background:#ffffff;
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}

/* Muted text */
.muted{
  color:#4b5563;
}

/* Buttons */
.btn-dark{
  background:#166534;
  border:0;
}

.btn-dark:hover{
  background:#14532d;
}

.btn-outline-dark{
  border-color:#166534;
  color:#166534;
}

.btn-outline-dark:hover{
  background:#166534;
  color:#ffffff;
}

/* Table */
.table thead th{
  font-size:.85rem;
  color:#4b5563;
  font-weight:600;
}

/* Status pills */
.pill{
  border-radius:999px;
  padding:.25rem .6rem;
  font-size:.78rem;
  font-weight:600;
  display:inline-block;
}

.pill-active{
  background:#166534;
  color:#ffffff;
}

.pill-blocked{
  background:#b91c1c;
  color:#ffffff;
}
</style>
</head>
<body>

<div class="d-flex">
<aside class="sidebar p-3">

<div class="fs-5 mb-3">
<i class="bi bi-heart-pulse-fill me-2"></i>SMART FIT • Admin
</div>

<a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
<a href="users.html"><i class="bi bi-people me-2"></i>Manage Users</a>
<a href="trainers.html"><i class="bi bi-person-badge me-2"></i>Manage Trainers</a>
<a class="active" href="workouts.html"><i class="bi bi-activity me-2"></i>Manage Workouts</a>
<a href="payments.html"><i class="bi bi-cash-coin me-2"></i>Payments</a>
<a href="feedback.html"><i class="bi bi-chat-left-text me-2"></i>Feedback</a>
<a href="../../index.html"><i class="bi bi-arrow-left me-2"></i>Back to Home</a>

<hr class="border-secondary my-3"/>
<button id="btnLogout" class="btn btn-outline-light w-100">
<i class="bi bi-box-arrow-right me-2"></i>Logout
</button>

</aside>

<main class="flex-grow-1 p-4">

<h3><i class="bi bi-activity me-2"></i>Manage Workouts</h3>
<p class="text-muted">
<i class="bi bi-lightning-charge me-1"></i>
Create and manage workout programs
</p>

<!-- Add Workout -->
<div class="card card-soft p-3 mb-4">
<h5><i class="bi bi-plus-circle me-2"></i>Add Workout</h5>

<div class="row g-2">
<div class="col-md-3">
<input id="wTitle" class="form-control" placeholder="Title">
</div>

<div class="col-md-2">
<select id="wLevel" class="form-select">
<option value="beginner">beginner</option>
<option value="intermediate">intermediate</option>
<option value="advanced">advanced</option>
</select>
</div>

<div class="col-md-2">
<input id="wDuration" type="number" class="form-control" placeholder="Duration (min)">
</div>

<div class="col-md-2">
<input id="wCalories" type="number" class="form-control" placeholder="Calories">
</div>

<div class="col-md-2">
<input id="wYoutube" class="form-control" placeholder="YouTube URL (optional)">
</div>

<div class="col-md-1 d-grid">
<button class="btn btn-dark" onclick="addWorkout()">
<i class="bi bi-plus-lg me-1"></i>Add
</button>
</div>
</div>

<div id="msg" class="mt-2"></div>
</div>

<!-- Workout List -->
<div class="card card-soft p-3">
<h5><i class="bi bi-list-ul me-2"></i>Workout List</h5>

<div class="table-responsive">
<table class="table align-middle">
<thead>
<tr>
<th>ID</th>
<th><i class="bi bi-card-text me-1"></i>Title</th>
<th><i class="bi bi-bar-chart me-1"></i>Level</th>
<th><i class="bi bi-clock me-1"></i>Duration</th>
<th><i class="bi bi-fire me-1"></i>Calories</th>
<th><i class="bi bi-youtube me-1"></i>YouTube</th>
<th><i class="bi bi-gear me-1"></i>Action</th>
</tr>
</thead>

<tbody id="tbWorkouts">
<tr><td colspan="7" class="text-center">Loading...</td></tr>
</tbody>
</table>
</div>
</div>

</main>
</div>

<script>
const BASE="../../";

async function guardAdmin(){
const r=await fetch(BASE+"backend/check_auth.php",{credentials:"include"});
if(r.status===401){location.href=BASE+"login.html";return false;}
const d=await r.json();
if(d.role!=="admin"){location.href=BASE+"login.html";return false;}
return true;
}

async function logout(){
await fetch(BASE+"backend/logout.php",{credentials:"include"});
location.href=BASE+"login.html";
}

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

async function loadWorkouts(){
const r=await fetch(BASE+"backend/admin_get_workouts.php",{credentials:"include"});
const d=await r.json();
const tb=document.getElementById("tbWorkouts");
if(!d.ok){tb.innerHTML="<tr><td colspan='7'>Error loading</td></tr>";return;}
if(!d.workouts.length){tb.innerHTML="<tr><td colspan='7'>No workouts</td></tr>";return;}

tb.innerHTML=d.workouts.map(w=>`
<tr>
<td>${w.id}</td>
<td>${esc(w.title)}</td>
<td>${esc(w.level)}</td>
<td>${w.duration_min} min</td>
<td>${w.calories}</td>
<td>${w.youtube_url?`<a href="${esc(w.youtube_url)}" target="_blank"><i class="bi bi-youtube text-danger"></i> View</a>`:"-"}</td>
<td>
<button class="btn btn-sm btn-danger" onclick="deleteWorkout(${w.id})">
<i class="bi bi-trash me-1"></i>Delete
</button>
</td>
</tr>`).join("");
}

async function addWorkout(){
const fd=new FormData();
fd.append("title",document.getElementById("wTitle").value);
fd.append("level",document.getElementById("wLevel").value);
fd.append("duration",document.getElementById("wDuration").value);
fd.append("calories",document.getElementById("wCalories").value);
fd.append("youtube",document.getElementById("wYoutube").value);

const r=await fetch(BASE+"backend/admin_create_workout.php",{method:"POST",body:fd,credentials:"include"});
const d=await r.json();
document.getElementById("msg").innerHTML=d.message;
if(d.ok){loadWorkouts();}
}

async function deleteWorkout(id){
if(!confirm("Delete workout?"))return;
const fd=new FormData();
fd.append("id",id);
const r=await fetch(BASE+"backend/admin_delete_workout.php",{method:"POST",body:fd,credentials:"include"});
const d=await r.json();
if(d.ok)loadWorkouts();
}

document.getElementById("btnLogout").addEventListener("click",logout);

(async()=>{
const ok=await guardAdmin();
if(!ok)return;
loadWorkouts();
})();
</script>

</body>
</html>
