<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Schedule | Smart Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- keep -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- add for icon sidebar -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root{
      --bg1:#c8f06b;
      --bg2:#b7ea5a;

      --sidebar:#111318;
      --sidebar2:#0c0e12;

      --green:#b8f14d;
      --green2:#7ee000;

      --text:#0f172a;
      --muted:#6b7280;

      --line:#e5e7eb;
      --shadow: 0 18px 50px rgba(0,0,0,.18);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

     body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height:100vh;
      background: url("../../assets/img/member-bg.jpg") center/cover no-repeat fixed;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(circle at 20px 20px, rgba(255,255,255,.18) 2px, transparent 2px),
        radial-gradient(circle at 60px 60px, rgba(0,0,0,.05) 2px, transparent 2px);
      background-size: 80px 80px;
      opacity:.45;
      pointer-events:none;
    }

    .app{
      height:100vh;
      display:flex;
      padding:22px;
      gap:18px;
      position:relative;
      z-index:1;
    }

    /* Sidebar (dashboard icon style) */
    .sidebar{
      width: 88px;
      min-width:88px;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar2));
      border-radius: 26px;
      padding: 18px 12px;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 14px;
    }

    .brand{
      width:44px;height:44px;border-radius:14px;
      display:grid;place-items:center;
      color: var(--green2);
      border:1px solid rgba(184,241,77,.35);
      background: rgba(255,255,255,.06);
      margin-bottom:4px;
    }

    .nav-ico{
      width:44px;height:44px;border-radius:16px;
      display:grid;place-items:center;
      color:#cbd5e1;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      cursor:pointer;
      transition:.18s ease;
      text-decoration:none;
    }
    .nav-ico:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.08);
    }
    .nav-ico.active{
      background: linear-gradient(135deg, var(--green), var(--green2));
      color:#0b0f14;
      border-color: transparent;
    }
    .spacer{ flex:1; }

    /* Main panel */
    .main{
      flex:1;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(255,255,255,.6);
      backdrop-filter: blur(10px);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 18px;
      overflow:hidden;
    }

    .content{
      height:100%;
      overflow:auto;
      padding-right: 6px;
    }
    .content::-webkit-scrollbar{ width:10px; }
    .content::-webkit-scrollbar-thumb{ background: rgba(15,23,42,.18); border-radius: 20px; }

    /* your old UI (kept look, but rounded + soft) */
    .card.shadow-sm{
      border-radius: 18px !important;
      border: 1px solid #eef2f7 !important;
      box-shadow: 0 12px 30px rgba(0,0,0,.06) !important;
    }
    .btn-pill{ border-radius:999px; font-weight:900; }
    .mini { font-size: 12px; }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .hello h5{ margin:0; font-weight: 900; }
    .hello p{ margin:6px 0 0; color: var(--muted); font-size: 13px; font-weight:800; }

    .pill{
      background:#111827;
      color:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-weight:900;
      font-size:13px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      box-shadow: 0 10px 25px rgba(0,0,0,.10);
      white-space:nowrap;
    }
  </style>
</head>

<body>
<div class="app">

  <!-- ICON SIDEBAR -->
  <aside class="sidebar">
    <div class="brand"><i class="fa-solid fa-dumbbell"></i></div>

    <a class="nav-ico" href="dashboard.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
    <a class="nav-ico" href="workouts.html" title="Workouts"><i class="fa-solid fa-dumbbell"></i></a>
    <a class="nav-ico" href="myworkout.html" title="My Workouts"><i class="fa-solid fa-list-check"></i></a>
    <a class="nav-ico" href="progress.html" title="Progress"><i class="fa-solid fa-chart-line"></i></a>
    <a class="nav-ico" href="meal_plans.html" title="Meal Plans"><i class="fa-solid fa-bowl-food"></i></a>
    <a class="nav-ico" href="nutrition.html" title="Nutrition"><i class="fa-solid fa-apple-whole"></i></a>

    <!-- ✅ active -->
    <a class="nav-ico active" href="schedule.html" title="Schedule"><i class="fa-solid fa-calendar-days"></i></a>

    <a class="nav-ico" href="subscription.html" title="Subscription"><i class="fa-solid fa-credit-card"></i></a>
    <a class="nav-ico" href="bmi.html" title="BMI"><i class="fa-solid fa-calculator"></i></a>
    <a class="nav-ico" href="feedback.html" title="Feedback"><i class="fa-solid fa-comment-dots"></i></a>

    <div class="spacer"></div>

    <a class="nav-ico" href="../../index.html" title="Back to Website"><i class="fa-solid fa-globe"></i></a>
    <a class="nav-ico" href="notifications.html" title="Notifications"><i class="fa-regular fa-bell"></i></a>
    <a class="nav-ico" href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a>
    <a class="nav-ico" href="#" id="btnLogout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a>
  </aside>

  <!-- MAIN -->
  <section class="main">
    <div class="content">

      <div class="top">
        <div class="hello">
          <h5>📅 My Schedule</h5>
          <p>Your personal reminders & trainer check-ins (DB based)</p>
        </div>
        <span class="pill"><i class="bi bi-check2-circle"></i> Ready</span>
      </div>

      <div class="row g-3">
        <!-- Member Add -->
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="fw-bold mb-2"><i class="bi bi-plus-circle me-2"></i>Add Reminder</div>

              <label class="form-label small text-muted mb-1">Title</label>
              <input id="title" class="form-control mb-2" placeholder="e.g., Water reminder">

              <div class="row g-2">
                <div class="col-md-6">
                  <label class="form-label small text-muted mb-1">Date</label>
                  <input id="date" type="date" class="form-control">
                </div>
                <div class="col-md-6">
                  <label class="form-label small text-muted mb-1">Time (optional)</label>
                  <input id="time" type="time" class="form-control">
                </div>
              </div>

              <label class="form-label small text-muted mt-2 mb-1">Notes</label>
              <textarea id="notes" class="form-control" rows="3" placeholder="Steps / Sleep / workout plan..."></textarea>

              <div class="d-flex gap-2 mt-3">
                <button class="btn btn-dark btn-pill" id="btnAdd"><i class="bi bi-check2-circle me-1"></i>Add</button>
                <button class="btn btn-outline-secondary btn-pill" id="btnClear"><i class="bi bi-x-circle me-1"></i>Clear</button>
                <button class="btn btn-outline-dark btn-pill ms-auto" id="btnReload"><i class="bi bi-arrow-repeat me-1"></i>Reload</button>
              </div>

              <div id="msg" class="small mt-2"></div>
              <div class="small text-muted mt-2">Note: Trainer-created schedules will also appear here.</div>
            </div>
          </div>
        </div>

        <!-- List -->
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="fw-bold"><i class="bi bi-list-task me-2"></i>Upcoming</div>
                <span class="badge text-bg-light border">DB</span>
              </div>
              <div id="list" class="vstack gap-2">
                <div class="text-muted">Loading...</div>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </section>
</div>

<script>
const API = {
  whoami: "../../backend/whoami.php",
  add: "../../backend/schedule_add.php",
  list: "../../backend/schedule_list.php",
  del: "../../backend/schedule_delete.php",
  done: "../../backend/schedule_mark_done.php",
  logout: "../../backend/logout.php"
};

function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function showMsg(t, ok=false){
  const el = document.getElementById("msg");
  el.className = ok ? "text-success" : "text-danger";
  el.textContent = t || "";
}

async function authGuard(){
  try{
    const res = await fetch(API.whoami, { credentials:"same-origin" });
    const me = await res.json();
    if(!me.logged_in || (me.role||"").toLowerCase() !== "member"){
      window.location.href = "../../login.html";
      return null;
    }
    const name = (me.name || me.username || "Member").trim();
    // kept: old UI had navUsername, icon sidebar doesn't show it
    const nav = document.getElementById("navUsername");
    if(nav) nav.textContent = name;
    return me;
  }catch{
    window.location.href = "../../login.html";
    return null;
  }
}

function clearForm(){
  ["title","date","time","notes"].forEach(id=>document.getElementById(id).value="");
  showMsg("");
}

function badgeRole(created_by_role){
  return created_by_role === "trainer"
    ? `<span class="badge text-bg-primary">Trainer</span>`
    : `<span class="badge text-bg-secondary">Me</span>`;
}

function badgeStatus(status){
  const s = (status || "pending").toLowerCase();
  if(s === "done") return `<span class="badge text-bg-success">Done</span>`;
  return `<span class="badge text-bg-warning text-dark">Pending</span>`;
}

async function markDone(id){
  const r = await fetch(API.done, {
    method:"POST",
    credentials:"same-origin",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ id })
  });
  const out = await r.json();
  if(!out.ok) throw new Error(out.message || "Mark done failed");
}

async function deleteReminder(id){
  const r = await fetch(API.del, {
    method:"POST",
    credentials:"same-origin",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ id })
  });
  const out = await r.json();
  if(!out.ok) throw new Error(out.message || "Delete failed");
}

async function loadList(){
  const list = document.getElementById("list");
  list.innerHTML = `<div class="text-muted">Loading...</div>`;

  try{
    const res = await fetch(API.list, { credentials:"same-origin" });
    const data = await res.json();
    if(!data.ok) throw new Error(data.message || "Failed");

    if(!data.items || data.items.length === 0){
      list.innerHTML = `<div class="text-muted">No schedule items</div>`;
      return;
    }

    list.innerHTML = "";

    data.items.forEach(it=>{
      const when = `${it.schedule_date}${it.schedule_time ? " • "+it.schedule_time : ""}`;
      const roleBadge = badgeRole(it.created_by_role);
      const statusBadge = badgeStatus(it.status);
      const isDone = String(it.status || "pending").toLowerCase() === "done";

      const doneText = (isDone && it.completed_at)
        ? `<div class="mini text-success mt-2"><i class="bi bi-check-circle me-1"></i>Completed: ${esc(it.completed_at)}</div>`
        : ``;

      const btnDelete = (it.created_by_role === "member")
        ? `<button class="btn btn-sm btn-outline-danger btn-pill" data-del="${it.id}" title="Delete reminder"><i class="bi bi-trash3"></i></button>`
        : `<button class="btn btn-sm btn-outline-secondary btn-pill" disabled title="Trainer schedule cannot be deleted by member"><i class="bi bi-lock"></i></button>`;

      const btnDone = (!isDone)
        ? `<button class="btn btn-sm btn-outline-success btn-pill ms-2" data-done="${it.id}" title="Mark as done"><i class="bi bi-check2"></i></button>`
        : `<button class="btn btn-sm btn-outline-success btn-pill ms-2" disabled title="Already completed"><i class="bi bi-check2-all"></i></button>`;

      list.innerHTML += `
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div class="me-2">
                <div class="fw-bold">
                  ${esc(it.title)}
                  <span class="ms-2">${roleBadge}</span>
                  <span class="ms-2">${statusBadge}</span>
                </div>

                <div class="text-muted small mt-1">${esc(when)}</div>

                ${it.notes ? `<div class="small mt-2" style="white-space:pre-line">${esc(it.notes)}</div>` : ``}
                ${doneText}
              </div>

              <div class="d-flex align-items-start">
                ${btnDelete}
                ${btnDone}
              </div>
            </div>
          </div>
        </div>
      `;
    });

    list.querySelectorAll("[data-del]").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const id = parseInt(btn.getAttribute("data-del"),10);
        if(!confirm("Delete this reminder?")) return;

        btn.disabled = true;
        try{
          await deleteReminder(id);
          await loadList();
        }catch(e){
          alert(e.message || "Delete failed");
          btn.disabled = false;
        }
      });
    });

    list.querySelectorAll("[data-done]").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const id = parseInt(btn.getAttribute("data-done"),10);
        if(!confirm("Mark this schedule as done?")) return;

        btn.disabled = true;
        try{
          await markDone(id);
          await loadList();
        }catch(e){
          alert(e.message || "Mark done failed");
          btn.disabled = false;
        }
      });
    });

  }catch(e){
    list.innerHTML = `<div class="text-danger">Error: ${esc(e.message)}</div>`;
  }
}

document.getElementById("btnAdd").addEventListener("click", async ()=>{
  showMsg("");

  const btn = document.getElementById("btnAdd");
  btn.disabled = true;

  const payload = {
    title: document.getElementById("title").value.trim(),
    date:  document.getElementById("date").value,
    time:  document.getElementById("time").value,
    notes: document.getElementById("notes").value.trim(),
  };

  try{
    const r = await fetch(API.add,{
      method:"POST",
      credentials:"same-origin",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });
    const out = await r.json();
    if(!out.ok) throw new Error(out.message || "Add failed");

    showMsg("Added ✅", true);
    clearForm();
    await loadList();
  }catch(e){
    showMsg(e.message || "Failed");
  }finally{
    btn.disabled = false;
  }
});

document.getElementById("btnClear").addEventListener("click", clearForm);
document.getElementById("btnReload").addEventListener("click", loadList);

/* Logout */
document.getElementById("btnLogout").addEventListener("click", async (e)=>{
  e.preventDefault();
  try{ await fetch(API.logout, { method:"POST", credentials:"same-origin" }); }catch{}
  window.location.href = "../../login.html";
});

(async function(){
  const me = await authGuard();
  if(me) await loadList();
})();
</script>
</body>
</html>
