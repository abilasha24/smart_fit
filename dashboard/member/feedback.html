<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback | Smart Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- keep -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- add for icon sidebar -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root{
      --bg1:#c8f06b;
      --bg2:#b7ea5a;

      --sidebar:#111318;
      --sidebar2:#0c0e12;

      --green:#b8f14d;
      --green2:#7ee000;

      --text:#0f172a;
      --muted:#6b7280;

      --line:#e5e7eb;
      --shadow: 0 18px 50px rgba(0,0,0,.18);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height:100vh;
      background: url("../../assets/img/member-bg.jpg") center/cover no-repeat fixed;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(circle at 20px 20px, rgba(255,255,255,.18) 2px, transparent 2px),
        radial-gradient(circle at 60px 60px, rgba(0,0,0,.05) 2px, transparent 2px);
      background-size: 80px 80px;
      opacity:.45;
      pointer-events:none;
    }

    .app{
      height:100vh;
      display:flex;
      padding:22px;
      gap:18px;
      position:relative;
      z-index:1;
    }

    /* Sidebar (dashboard icon style) */
    .sidebar{
      width: 88px;
      min-width:88px;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar2));
      border-radius: 26px;
      padding: 18px 12px;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 14px;
    }

    .brand{
      width:44px;height:44px;border-radius:14px;
      display:grid;place-items:center;
      color: var(--green2);
      border:1px solid rgba(184,241,77,.35);
      background: rgba(255,255,255,.06);
      margin-bottom:4px;
    }

    .nav-ico{
      width:44px;height:44px;border-radius:16px;
      display:grid;place-items:center;
      color:#cbd5e1;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      cursor:pointer;
      transition:.18s ease;
      text-decoration:none;
    }
    .nav-ico:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.08);
    }
    .nav-ico.active{
      background: linear-gradient(135deg, var(--green), var(--green2));
      color:#0b0f14;
      border-color: transparent;
    }

    .spacer{ flex:1; }

    /* Main panel */
    .main{
      flex:1;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(255,255,255,.6);
      backdrop-filter: blur(10px);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 18px;
      overflow:hidden;
    }

    .content{
      height:100%;
      overflow:auto;
      padding-right: 6px;
    }
    .content::-webkit-scrollbar{ width:10px; }
    .content::-webkit-scrollbar-thumb{ background: rgba(15,23,42,.18); border-radius: 20px; }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .hello h5{ margin:0; font-weight: 900; }
    .hello p{ margin:6px 0 0; color: var(--muted); font-size: 13px; font-weight:800; }

    .pill{
      background:#fff;
      border:1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 13px;
      display:flex;
      align-items:center;
      gap: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
      user-select:none;
      white-space:nowrap;
      color:#111827;
    }

    .card, .card.shadow-sm{
      border-radius: 18px !important;
      border: 1px solid #eef2f7 !important;
      box-shadow: 0 12px 30px rgba(0,0,0,.06) !important;
    }

    .btn-pill{ border-radius:999px; font-weight:900; }
  </style>
</head>

<body>
<div class="app">

  <!-- ICON SIDEBAR -->
  <aside class="sidebar">
    <div class="brand"><i class="fa-solid fa-dumbbell"></i></div>

    <a class="nav-ico" href="dashboard.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
    <a class="nav-ico" href="workouts.html" title="Workouts"><i class="fa-solid fa-dumbbell"></i></a>
    <a class="nav-ico" href="myworkout.html" title="My Workouts"><i class="fa-solid fa-list-check"></i></a>
    <a class="nav-ico" href="progress.html" title="Progress"><i class="fa-solid fa-chart-line"></i></a>
    <a class="nav-ico" href="meal_plans.html" title="Meal Plans"><i class="fa-solid fa-bowl-food"></i></a>
    <a class="nav-ico" href="nutrition.html" title="Nutrition"><i class="fa-solid fa-apple-whole"></i></a>
    <a class="nav-ico" href="schedule.html" title="Schedule"><i class="fa-solid fa-calendar-days"></i></a>
    <a class="nav-ico" href="subscription.html" title="Subscription"><i class="fa-solid fa-credit-card"></i></a>
    <a class="nav-ico" href="bmi.html" title="BMI"><i class="fa-solid fa-calculator"></i></a>

    <!-- ✅ active -->
    <a class="nav-ico active" href="feedback.html" title="Feedback"><i class="fa-solid fa-comment-dots"></i></a>

    <div class="spacer"></div>

    <a class="nav-ico" href="../../index.html" title="Back to Website"><i class="fa-solid fa-globe"></i></a>
    <a class="nav-ico" href="notifications.html" title="Notifications"><i class="fa-regular fa-bell"></i></a>
    <a class="nav-ico" href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a>
    <a class="nav-ico" href="#" id="btnLogout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a>
  </aside>

  <!-- MAIN -->
  <section class="main">
    <div class="content">

      <div class="top">
        <div class="hello">
          <h5>📝 Feedback</h5>
          <p>Send your feedback to improve Smart Fit</p>
        </div>

        <div class="d-flex align-items-center gap-2">
          <a href="dashboard.html" class="btn btn-outline-dark btn-sm btn-pill">⬅ Dashboard</a>
          <a href="../../index.html" class="btn btn-dark btn-sm btn-pill">🏠 Home</a>
          <div class="pill" id="statusText">⏳</div>
        </div>
      </div>

      <div id="msg" class="mb-3"></div>

      <div class="card shadow-sm">
        <div class="card-body">
          <form id="feedbackForm" onsubmit="return false;">
            <div class="mb-3">
              <label class="form-label fw-semibold">Subject</label>
              <input class="form-control" id="subject" placeholder="Eg: Workout suggestion" required minlength="3">
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Message</label>
              <textarea class="form-control" id="message" rows="5" placeholder="Write your feedback..." required minlength="5"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Rating (optional)</label>
              <select class="form-select" id="rating">
                <option value="">Select rating</option>
                <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                <option value="4">⭐⭐⭐⭐ (4)</option>
                <option value="3">⭐⭐⭐ (3)</option>
                <option value="2">⭐⭐ (2)</option>
                <option value="1">⭐ (1)</option>
              </select>
            </div>

            <button class="btn btn-success btn-pill" id="sendBtn">Submit Feedback</button>
          </form>
        </div>
      </div>

    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = {
  whoami: "../../backend/whoami.php",
  submitFeedback: "../../backend/submit_feedback.php",
  logout: "../../backend/logout.php"
};

function setStatus(t){ document.getElementById("statusText").textContent = t || ""; }
function showMsg(t, ok=false){
  const el = document.getElementById("msg");
  el.className = ok ? "text-success mb-3" : "text-danger mb-3";
  el.textContent = t || "";
}

/* ✅ FAST UI: show saved name instantly (kept, even though icon sidebar doesn't show it) */
(function(){
  const saved = localStorage.getItem("loggedUserName");
  if(saved){
    const nav = document.getElementById("navUsername");
    if(nav) nav.textContent = saved;
  }
})();

async function authGuard(){
  try{
    const res = await fetch(API.whoami, { credentials:"same-origin" });
    const me = await res.json();

    if(!me.logged_in || (me.role||"").toLowerCase() !== "member"){
      window.location.href = "../../login.html";
      return null;
    }

    const displayName = (me.name || me.username || "Member").trim();

    const nav = document.getElementById("navUsername");
    if(nav) nav.textContent = displayName;

    localStorage.setItem("loggedUserName", displayName);
    localStorage.setItem("loggedUserRole", (me.role || "member").toLowerCase());

    return me;
  }catch(e){
    window.location.href = "../../login.html";
    return null;
  }
}

async function submitFeedback(){
  showMsg(""); setStatus("Submitting...");

  const subject = document.getElementById("subject").value.trim();
  const message = document.getElementById("message").value.trim();
  const ratingStr = document.getElementById("rating").value;
  const rating = ratingStr ? parseInt(ratingStr, 10) : null;

  try{
    const res = await fetch(API.submitFeedback,{
      method:"POST",
      credentials:"same-origin",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ subject, message, rating })
    });

    const data = await res.json();
    if(!data.ok){
      showMsg(data.message || "Failed to submit");
      setStatus("");
      return;
    }

    showMsg("Feedback submitted ✅ Thank you!", true);
    document.getElementById("feedbackForm").reset();
    setStatus("Done ✅");
  }catch(e){
    console.error(e);
    showMsg("Network error while submitting feedback");
    setStatus("");
  }
}

document.getElementById("sendBtn").addEventListener("click", submitFeedback);

/* ✅ Logout */
document.getElementById("btnLogout").addEventListener("click", async (e) => {
  e.preventDefault();
  try{
    await fetch(API.logout, { method:"POST", credentials:"same-origin" });
  }catch{}
  localStorage.removeItem("loggedUserName");
  localStorage.removeItem("loggedUserRole");
  window.location.href = "../../login.html";
});

/* ✅ init */
(async function(){
  const me = await authGuard();
  if(me) setStatus("Ready ✅");
})();
</script>

</body>
</html>
