<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meal Plans | Smart Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Keep Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Keep Bootstrap Icons (you already use bi- icons) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Add Font Awesome for sidebar icons (dashboard style) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root{
      --bg1:#c8f06b;
      --bg2:#b7ea5a;

      --sidebar:#111318;
      --sidebar2:#0c0e12;

      --card:#ffffff;
      --text:#0f172a;
      --muted:#6b7280;

      --green:#b8f14d;
      --green2:#7ee000;

      --line:#e5e7eb;
      --shadow: 0 18px 50px rgba(0,0,0,.18);

      --radius:18px;
    }

    *{ box-sizing:border-box; }

     body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height:100vh;
      background: url("../../assets/img/member-bg.jpg") center/cover no-repeat fixed;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(circle at 20px 20px, rgba(255,255,255,.18) 2px, transparent 2px),
        radial-gradient(circle at 60px 60px, rgba(0,0,0,.05) 2px, transparent 2px);
      background-size: 80px 80px;
      opacity:.45;
      pointer-events:none;
    }

    .app{
      height:100vh;
      display:flex;
      padding: 22px;
      gap: 18px;
      position:relative;
      z-index:1;
    }

    /* Sidebar (dashboard icon style) */
    .sidebar{
      width: 88px;
      min-width:88px;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar2));
      border-radius: 26px;
      padding: 18px 12px;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 14px;
    }

    .brand{
      width:44px;height:44px;border-radius:14px;
      display:grid;place-items:center;
      color: var(--green2);
      border:1px solid rgba(184,241,77,.35);
      background: rgba(255,255,255,.06);
      margin-bottom:4px;
    }

    .nav-ico{
      width:44px;height:44px;border-radius:16px;
      display:grid;place-items:center;
      color:#cbd5e1;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      cursor:pointer;
      transition:.18s ease;
      text-decoration:none;
    }
    .nav-ico:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.08);
    }
    .nav-ico.active{
      background: linear-gradient(135deg, var(--green), var(--green2));
      color:#0b0f14;
      border-color: transparent;
    }

    .spacer{ flex:1; }

    /* Main panel */
    .main{
      flex:1;
      background: rgba(255,255,255,.58);
      border: 1px solid rgba(255,255,255,.6);
      backdrop-filter: blur(10px);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 18px;
      overflow:hidden;
    }

    .content{
      height:100%;
      overflow:auto;
      padding-right: 6px;
    }
    .content::-webkit-scrollbar{ width:10px; }
    .content::-webkit-scrollbar-thumb{ background: rgba(15,23,42,.18); border-radius: 20px; }

    /* Top header (dashboard style) */
    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .hello h5{ margin:0; font-weight: 900; }
    .hello p{ margin:6px 0 0; color: var(--muted); font-size: 13px; font-weight:800; }

    .pill{
      background:#fff;
      border:1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 13px;
      display:flex;
      align-items:center;
      gap: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
      user-select:none;
      white-space:nowrap;
      color:#111827;
    }

    .panel{
      background: var(--card);
      border:1px solid #eef2f7;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
      padding: 14px;
      margin-bottom: 14px;
    }

    .muted{ color:#6b7280; font-weight:800; }

    .chip{
      display:inline-flex; align-items:center; gap:6px;
      background:#e9f7ef; color:#065f46;
      border:1px solid rgba(6,95,70,.15);
      padding:6px 10px; border-radius:999px; font-size:12px; font-weight:900;
      white-space:nowrap;
    }
    .chip.gray{ background:#eef2ff; color:#3730a3; border-color:rgba(55,48,163,.15); }
    .chip.warn{ background:#fff7ed; color:#9a3412; border-color:rgba(154,52,18,.15); }

    .btn-pill{ border-radius:999px; font-weight:900; }

    .plan-card{
      border:1px solid #eef2f7;
      border-radius:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.06);
      background:#fff;
    }
    .plan-title{ font-weight:900; font-size:1.05rem; margin:0; }
    .plan-meta{ font-size:12px; color:#6b7280; font-weight:800; }
    .plan-content{
      white-space:pre-wrap;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      margin-top:10px;
      color:#111827;
      font-weight:700;
    }

    .divider{ height:1px; background:#e5e7eb; margin:14px 0; }
  </style>
</head>

<body>
<div class="app">

  <!-- SIDEBAR (dashboard icon style) -->
  <aside class="sidebar">
    <div class="brand"><i class="fa-solid fa-dumbbell"></i></div>

    <a class="nav-ico" href="dashboard.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
    <a class="nav-ico" href="workouts.html" title="Workouts"><i class="fa-solid fa-dumbbell"></i></a>
    <a class="nav-ico" href="myworkout.html" title="My Workouts"><i class="fa-solid fa-list-check"></i></a>
    <a class="nav-ico" href="progress.html" title="Progress"><i class="fa-solid fa-chart-line"></i></a>

    <!-- ✅ active -->
    <a class="nav-ico active" href="meal_plans.html" title="Meal Plans"><i class="fa-solid fa-bowl-food"></i></a>
    <a class="nav-ico" href="nutrition.html" title="Nutrition"><i class="fa-solid fa-apple-whole"></i></a>
    <a class="nav-ico" href="schedule.html" title="Schedule"><i class="fa-solid fa-calendar-days"></i></a>
    <a class="nav-ico" href="subscription.html" title="Subscription"><i class="fa-solid fa-credit-card"></i></a>

    <a class="nav-ico" href="bmi.html" title="BMI"><i class="fa-solid fa-calculator"></i></a>
    <a class="nav-ico" href="feedback.html" title="Feedback"><i class="fa-solid fa-comment-dots"></i></a>

    <div class="spacer"></div>

    <a class="nav-ico" href="../../index.html" title="Back to Website"><i class="fa-solid fa-globe"></i></a>
    <a class="nav-ico" href="notifications.html" title="Notifications"><i class="fa-regular fa-bell"></i></a>
    <a class="nav-ico" href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a>
    <a class="nav-ico" href="#" id="btnLogout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a>
  </aside>

  <!-- MAIN -->
  <section class="main">
    <div class="content">

      <div class="top">
        <div class="hello">
          <h5>🥗 Meal Plans</h5>
          <p>Plans created by your trainer — follow daily and keep consistent ✅</p>
        </div>

        <div class="d-flex align-items-center gap-2">
          <span class="pill" id="statusPill">Ready <i class="bi bi-check2-circle text-success"></i></span>
        </div>
      </div>

      <div id="msg" class="mb-3 text-danger"></div>

      <!-- Stats + Search -->
      <div class="row g-3 mb-3">
        <div class="col-lg-4">
          <div class="panel">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="muted"><i class="bi bi-check2-square me-1"></i> Followed Today</div>
                <div class="fs-2 fw-bold" id="followToday">-</div>
                <div class="muted small" id="followHint">Tap “Mark Followed Today”</div>
              </div>
              <span class="chip" id="followBadge">Status</span>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="panel">
            <div class="muted"><i class="bi bi-bar-chart me-1"></i> Last 7 days</div>
            <div class="fs-2 fw-bold" id="last7">0</div>
            <div class="muted small">Your adherence count</div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="panel">
            <div class="muted"><i class="bi bi-search me-1"></i> Search</div>
            <input id="q" class="form-control mt-2" placeholder="Search plan title..." />
            <div class="muted small mt-2">Tip: type “fat / gain / beginner”</div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="d-flex flex-wrap gap-2 justify-content-end mb-2">
        <button class="btn btn-outline-dark btn-pill" id="btnReload">
          <i class="bi bi-arrow-clockwise me-1"></i> Reload
        </button>
        <button class="btn btn-dark btn-pill" id="btnFollow">
          <i class="bi bi-check2-circle me-1"></i> Mark Followed Today
        </button>
      </div>

      <div class="divider"></div>

      <!-- Plans -->
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="chip gray"><i class="bi bi-journal-text"></i> Available Meal Plans</span>
        <span class="muted small" id="countText"></span>
      </div>

      <div id="plans">Loading...</div>

    </div>
  </section>
</div>

<script>
  // ✅ Always use absolute base to avoid style/path issues
  const BASE_WEB = "/smart_fit/";
  const API = {
    whoami: BASE_WEB + "backend/whoami.php",
    list:   BASE_WEB + "backend/member_meal_plans_list.php",
    // optional endpoints (if you add them)
    followToday: BASE_WEB + "backend/member_meal_follow_today.php",
    followStatus: BASE_WEB + "backend/member_meal_follow_status.php",
    logout: BASE_WEB + "backend/logout.php"
  };

  const elPlans = document.getElementById("plans");
  const elMsg = document.getElementById("msg");
  const elCountText = document.getElementById("countText");
  const elQ = document.getElementById("q");

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
  }

  async function authGuard(){
    const r = await fetch(API.whoami, { credentials:"include" });
    if(r.status === 401){
      location.href = BASE_WEB + "login.html";
      return null;
    }
    const me = await r.json().catch(()=>null);
    if(!me || !me.logged_in){
      location.href = BASE_WEB + "login.html";
      return null;
    }
    if(me.role && me.role !== "member"){
      if(me.role === "trainer") location.href = BASE_WEB + "dashboard/trainer/dashboard.html";
      if(me.role === "admin")   location.href = BASE_WEB + "dashboard/admin/dashboard.html";
      return null;
    }
    // kept (even though icon sidebar doesn't display text)
    const u = document.getElementById("navUsername");
    if(u) u.textContent = me.username || me.name || "Member";
    return me;
  }

  function renderPlans(plans){
    const q = (elQ.value || "").trim().toLowerCase();
    const filtered = !q ? plans : plans.filter(p => String(p.title||"").toLowerCase().includes(q));

    elCountText.textContent = filtered.length ? `(${filtered.length})` : "";

    if(!filtered.length){
      elPlans.innerHTML = `<div class="text-muted">No meal plans found</div>`;
      return;
    }

    elPlans.innerHTML = filtered.map(p => `
      <div class="card plan-card mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
            <div>
              <p class="plan-title">${esc(p.title || "Meal Plan")}</p>
              <div class="plan-meta">
                <i class="bi bi-clock me-1"></i>${esc(p.created_at || "")}
              </div>
            </div>

            <button class="btn btn-outline-success btn-pill"
              onclick="usePlan(${Number(p.id)})">
              <i class="bi bi-check2-circle me-1"></i> Use this plan today
            </button>
          </div>

          <div class="divider"></div>

          <div class="plan-content">${esc(p.content || "")}</div>
        </div>
      </div>
    `).join("");
  }

  window.usePlan = async function(planId){
    await markFollowedToday();
    alert("Saved as followed for today ✅");
  }

  async function loadPlans(){
    elMsg.textContent = "";
    elPlans.innerHTML = "Loading...";

    const r = await fetch(API.list, { credentials:"include" });
    if(!r.ok){
      elPlans.innerHTML = `<div class="text-danger">Login required</div>`;
      return;
    }
    const d = await r.json().catch(()=>({ok:false}));
    if(!d.ok){
      elPlans.innerHTML = `<div class="text-danger">Failed to load</div>`;
      return;
    }
    renderPlans(d.plans || []);
  }

  async function loadFollowStatus(){
    const followToday = document.getElementById("followToday");
    const last7 = document.getElementById("last7");
    const badge = document.getElementById("followBadge");
    const hint = document.getElementById("followHint");

    followToday.textContent = "-";
    last7.textContent = "0";
    badge.className = "chip warn";
    badge.textContent = "Not linked";

    try{
      const r = await fetch(API.followStatus, { credentials:"include" });
      if(!r.ok) return;
      const d = await r.json().catch(()=>({ok:false}));
      if(!d.ok) return;

      const yes = !!d.followed_today;
      followToday.textContent = yes ? "YES" : "NO";
      last7.textContent = d.last7 ?? 0;

      if(yes){
        badge.className = "chip";
        badge.textContent = "Great! Logged ✅";
        hint.textContent = "Nice — keep it up";
      }else{
        badge.className = "chip warn";
        badge.textContent = "Pending";
        hint.textContent = "Tap “Mark Followed Today”";
      }
    }catch(e){}
  }

  async function markFollowedToday(){
    try{
      const r = await fetch(API.followToday, { method:"POST", credentials:"include" });
      if(!r.ok) return;
      await r.json().catch(()=>null);
    }catch(e){}
    await loadFollowStatus();
  }

  document.getElementById("btnLogout").addEventListener("click", async (e)=>{
    e.preventDefault();
    try{ await fetch(API.logout, { method:"POST", credentials:"include" }); }catch(err){}
    location.href = BASE_WEB + "login.html";
  });

  document.getElementById("btnReload").addEventListener("click", loadPlans);
  document.getElementById("btnFollow").addEventListener("click", markFollowedToday);
  elQ.addEventListener("input", ()=> loadPlans());

  (async function init(){
    const me = await authGuard();
    if(!me) return;

    await loadPlans();
    await loadFollowStatus();
  })();
</script>
</body>
</html>
