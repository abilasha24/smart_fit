<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>🏋️ My Workouts - Member</title>

<!-- Bootstrap (optional, safe) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<!-- Font Awesome (same as dashboard) -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

<style>
  :root{
    --bg1:#c8f06b;
    --bg2:#b7ea5a;

    --sidebar:#111318;
    --sidebar2:#0c0e12;

    --card:#ffffff;
    --text:#0f172a;
    --muted:#6b7280;

    --green:#b8f14d;
    --green2:#7ee000;

    --line:#e5e7eb;
    --shadow: 0 18px 50px rgba(0,0,0,.18);

    --radius:18px;
  }

  *{ box-sizing:border-box; }

   body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height:100vh;
      background: url("../../assets/img/member-bg.jpg") center/cover no-repeat fixed;
      overflow:hidden;
    }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(circle at 20px 20px, rgba(255,255,255,.18) 2px, transparent 2px),
      radial-gradient(circle at 60px 60px, rgba(0,0,0,.05) 2px, transparent 2px);
    background-size: 80px 80px;
    opacity:.45;
    pointer-events:none;
  }

  .app{
    height:100vh;
    display:flex;
    padding: 22px;
    gap: 18px;
    position:relative;
    z-index:1;
  }

  /* Sidebar (dashboard style) */
  .sidebar{
    width: 88px;
    min-width:88px;
    background: linear-gradient(180deg, var(--sidebar), var(--sidebar2));
    border-radius: 26px;
    padding: 18px 12px;
    box-shadow: var(--shadow);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 14px;
  }

  .brand{
    width:44px;height:44px;border-radius:14px;
    display:grid;place-items:center;
    color: var(--green2);
    border:1px solid rgba(184,241,77,.35);
    background: rgba(255,255,255,.06);
    margin-bottom:4px;
  }

  .nav-ico{
    width:44px;height:44px;border-radius:16px;
    display:grid;place-items:center;
    color:#cbd5e1;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.05);
    cursor:pointer;
    transition:.18s ease;
    text-decoration:none;
  }
  .nav-ico:hover{
    transform: translateY(-1px);
    background: rgba(255,255,255,.08);
  }
  .nav-ico.active{
    background: linear-gradient(135deg, var(--green), var(--green2));
    color:#0b0f14;
    border-color: transparent;
  }

  .spacer{ flex:1; }

  /* Main panel */
  .main{
    flex:1;
    background: rgba(255,255,255,.58);
    border: 1px solid rgba(255,255,255,.6);
    backdrop-filter: blur(10px);
    border-radius: 26px;
    box-shadow: var(--shadow);
    padding: 18px;
    display:flex;
    gap: 16px;
    overflow:hidden;
  }

  .left{
    flex: 1;
    overflow:auto;
    padding-right: 6px;
  }
  .left::-webkit-scrollbar{ width:10px; }
  .left::-webkit-scrollbar-thumb{ background: rgba(15,23,42,.18); border-radius: 20px; }

  /* top header */
  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .hello h5{ margin:0; font-weight: 900; }
  .hello p{ margin:2px 0 0; color: var(--muted); font-size: 13px; }

  .pill{
    background:#fff;
    border:1px solid var(--line);
    border-radius: 999px;
    padding: 8px 12px;
    font-weight: 800;
    font-size: 13px;
    display:flex;
    align-items:center;
    gap: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,.08);
    user-select:none;
    white-space:nowrap;
  }

  .panel{
    background: var(--card);
    border:1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 12px 30px rgba(0,0,0,.08);
    padding: 14px;
    margin-bottom: 14px;
  }

  /* table styles (dashboard-like) */
  .table-wrap{
    background:#fff;
    border:1px solid #eef2f7;
    border-radius: 18px;
    box-shadow: 0 12px 30px rgba(0,0,0,.06);
    overflow:hidden;
  }

  table{ width:100%; border-collapse:collapse; }
  thead th{
    background:#ffffff;
    color:#334155;
    text-align:left;
    padding: 12px 14px;
    font-weight: 900;
    border-bottom: 1px solid #eef2f7;
    font-size: 12px;
    white-space:nowrap;
  }
  tbody td{
    padding:12px 14px;
    border-bottom:1px solid #f3f4f6;
    font-size: 14px;
    vertical-align: middle;
  }
  tbody tr:hover td{ background:#f8fafc; }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    border:1px solid var(--line);
    background:#fff;
    white-space:nowrap;
  }
  .b-assigned{ color:#9a3412; }
  .b-started{ color:#3730a3; }
  .b-completed{ color:#166534; }

  .btn-watch{
    display:inline-block;
    padding:8px 12px;
    border-radius: 12px;
    font-weight: 900;
    border: 1px solid #111827;
    background:#111827;
    color:#fff;
    text-decoration:none;
    white-space:nowrap;
  }

  .alertx{
    background:#fff;
    border:1px solid #eef2f7;
    padding:12px 14px;
    border-radius:14px;
    box-shadow: 0 12px 30px rgba(0,0,0,.06);
    margin: 12px 0;
    font-weight: 800;
    color:#111827;
  }
  .alertx.warn{
    background:#fff3cd;
    border-color:#ffeeba;
    color:#7a5a00;
  }
  .alertx.error{
    background:#ffe5e5;
    border-color:#ffbdbd;
    color:#7a0f0f;
  }
</style>
</head>

<body>
<div class="app">

  <!-- Sidebar (icon style like main dashboard) -->
  <aside class="sidebar">
    <div class="brand"><i class="fa-solid fa-dumbbell"></i></div>

    <a class="nav-ico" href="dashboard.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
    <a class="nav-ico" href="workouts.html" title="Workouts"><i class="fa-solid fa-dumbbell"></i></a>
    <a class="nav-ico active" href="myworkout.html" title="My Workouts"><i class="fa-solid fa-list-check"></i></a>
    <a class="nav-ico" href="progress.html" title="Progress"><i class="fa-solid fa-chart-line"></i></a>
    <a class="nav-ico" href="meal_plans.html" title="Meal Plans"><i class="fa-solid fa-bowl-food"></i></a>
    <a class="nav-ico" href="nutrition.html" title="Nutrition"><i class="fa-solid fa-apple-whole"></i></a>
    <a class="nav-ico" href="schedule.html" title="Schedule"><i class="fa-solid fa-calendar-days"></i></a>
    <a class="nav-ico" href="subscription.html" title="Subscription"><i class="fa-solid fa-credit-card"></i></a>

    <a class="nav-ico" href="bmi.html" title="BMI"><i class="fa-solid fa-calculator"></i></a>
    <a class="nav-ico" href="feedback.html" title="Feedback"><i class="fa-solid fa-comment-dots"></i></a>

    <div class="spacer"></div>

    <a class="nav-ico" href="../../index.html" title="Back to Website"><i class="fa-solid fa-globe"></i></a>
    <a class="nav-ico" href="notifications.html" title="Notifications"><i class="fa-regular fa-bell"></i></a>
    <a class="nav-ico" href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a>
    <a class="nav-ico" href="#" id="btnLogout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a>
  </aside>

  <!-- Main panel -->
  <section class="main">
    <div class="left">

      <div class="top">
        <div class="hello">
          <h5>🏋️ My Workouts</h5>
          <p>Your workout history</p>
        </div>
        <div class="pill" id="statusTop">⏳ Loading...</div>
      </div>

      <div id="msg"></div>

      <div class="table-wrap">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>🏷️ Workout</th>
                <th>🎚️ Level</th>
                <th>⏱️ Duration</th>
                <th>🔥 Calories</th>
                <th>✅ Status</th>
                <th>📅 Date</th>
                <th>🎥 Video</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr><td colspan="8">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </section>

</div>

<script>
  // ✅ IMPORTANT: Your project folder is SMART_FIT (CAPS)
  const API_BASE = "/backend";

  const rowsEl = document.getElementById("rows");
  const statusTop = document.getElementById("statusTop");
  const msgEl = document.getElementById("msg");

  function showMsg(text,type="warn"){
    if(!text){ msgEl.innerHTML=""; return; }
    msgEl.innerHTML = `<div class="alertx ${type}">${text}</div>`;
  }

  async function safeJson(res){
    const t = await res.text();
    // If backend returns HTML 404, show it clearly
    try { return JSON.parse(t); }
    catch(e){
      throw new Error(t);
    }
  }

  function esc(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function statusBadge(st){
    const s = (st||"").toLowerCase();
    if(s === "completed") return `<span class="badge b-completed">✅ completed</span>`;
    if(s === "started") return `<span class="badge b-started">▶️ started</span>`;
    return `<span class="badge b-assigned">📝 assigned</span>`;
  }

  function fmtDate(d){
    if(!d) return "-";
    return esc(d.replace("T"," ").slice(0,19));
  }

  function rowHtml(item, idx){
    const yt = item.youtube_url || "";
    return `
      <tr>
        <td>${idx+1}</td>
        <td><b>${esc(item.title || "Workout")}</b></td>
        <td>${esc(item.level || "-")}</td>
        <td>${esc(item.duration_min || 0)} min</td>
        <td>${esc(item.calories || 0)} cal</td>
        <td>${statusBadge(item.status)}</td>
        <td>${fmtDate(item.date)}</td>
        <td>
          ${yt ? `<a class="btn-watch" href="${esc(yt)}" target="_blank">▶️ Watch</a>` : `—`}
        </td>
      </tr>
    `;
  }

  async function loadMyWorkouts(){
    try{
      statusTop.textContent = "⏳ Loading...";
      showMsg("");

      // ✅ This must exist: /backend/my_workouts.php
      const res = await fetch(API_BASE + "/my_workouts.php", { credentials:"include" });
      const data = await safeJson(res);

      if(!data.ok){
        statusTop.textContent = "❌ Error";
        showMsg("❌ " + (data.message || "Failed"), "error");
        rowsEl.innerHTML = `<tr><td colspan="8">No data</td></tr>`;
        return;
      }

      const items = data.items || [];
      statusTop.textContent = `✅ Loaded ${items.length}`;

      if(!items.length){
        rowsEl.innerHTML = `<tr><td colspan="8">No workouts yet. Go to 💪 Workouts page and Start/Complete one.</td></tr>`;
        return;
      }

      rowsEl.innerHTML = items.map(rowHtml).join("");

    }catch(err){
      statusTop.textContent = "❌ Error";
      showMsg("❌ Failed to load: <br><br>" + esc(err.message), "error");
      rowsEl.innerHTML = `<tr><td colspan="8">No data</td></tr>`;
    }
  }

  document.getElementById("btnLogout").addEventListener("click", async (e)=>{
    e.preventDefault();
    await fetch(API_BASE + "/logout.php", { method:"POST", credentials:"include" });
    window.location.href = "../../index.html";
  });

  loadMyWorkouts();
</script>

</body>
</html>
