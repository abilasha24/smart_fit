<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notifications | Smart Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- keep -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- add for icon sidebar -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root{
      --bg1:#c8f06b;
      --bg2:#b7ea5a;

      --sidebar:#111318;
      --sidebar2:#0c0e12;

      --green:#b8f14d;
      --green2:#7ee000;

      --text:#0f172a;
      --muted:#6b7280;

      --line:#e5e7eb;
      --shadow: 0 18px 50px rgba(0,0,0,.18);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height:100vh;
      background: url("../../assets/img/member-bg.jpg") center/cover no-repeat fixed;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(circle at 20px 20px, rgba(255,255,255,.18) 2px, transparent 2px),
        radial-gradient(circle at 60px 60px, rgba(0,0,0,.05) 2px, transparent 2px);
      background-size: 80px 80px;
      opacity:.45;
      pointer-events:none;
    }

    .app{
      height:100vh;
      display:flex;
      padding:22px;
      gap:18px;
      position:relative;
      z-index:1;
    }

    /* Sidebar (dashboard icon style) */
    .sidebar{
      width: 88px;
      min-width:88px;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar2));
      border-radius: 26px;
      padding: 18px 12px;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 14px;
    }

    .brand{
      width:44px;height:44px;border-radius:14px;
      display:grid;place-items:center;
      color: var(--green2);
      border:1px solid rgba(184,241,77,.35);
      background: rgba(255,255,255,.06);
      margin-bottom:4px;
    }

    .nav-ico{
      width:44px;height:44px;border-radius:16px;
      display:grid;place-items:center;
      color:#cbd5e1;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      cursor:pointer;
      transition:.18s ease;
      text-decoration:none;
    }
    .nav-ico:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.08);
    }
    .nav-ico.active{
      background: linear-gradient(135deg, var(--green), var(--green2));
      color:#0b0f14;
      border-color: transparent;
    }

    .spacer{ flex:1; }

    /* Main panel */
    .main{
      flex:1;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(255,255,255,.6);
      backdrop-filter: blur(10px);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 18px;
      overflow:hidden;
    }

    .content{
      height:100%;
      overflow:auto;
      padding-right: 6px;
    }
    .content::-webkit-scrollbar{ width:10px; }
    .content::-webkit-scrollbar-thumb{ background: rgba(15,23,42,.18); border-radius: 20px; }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap:wrap;
    }
    .hello h5{ margin:0; font-weight: 900; }
    .hello p{ margin:6px 0 0; color: var(--muted); font-size: 13px; font-weight:800; }

    .pill{
      background:#fff;
      border:1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 13px;
      display:flex;
      align-items:center;
      gap: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
      user-select:none;
      white-space:nowrap;
      color:#111827;
    }

    .card, .card.shadow-sm{
      border-radius: 18px !important;
      border: 1px solid #eef2f7 !important;
      box-shadow: 0 12px 30px rgba(0,0,0,.06) !important;
    }

    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:8px; }
    .btn-pill{ border-radius:999px; font-weight:900; }
  </style>
</head>

<body>
<div class="app">

  <!-- ICON SIDEBAR -->
  <aside class="sidebar">
    <div class="brand"><i class="fa-solid fa-dumbbell"></i></div>

    <a class="nav-ico" href="dashboard.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
    <a class="nav-ico" href="workouts.html" title="Workouts"><i class="fa-solid fa-dumbbell"></i></a>
    <a class="nav-ico" href="myworkout.html" title="My Workouts"><i class="fa-solid fa-list-check"></i></a>
    <a class="nav-ico" href="progress.html" title="Progress"><i class="fa-solid fa-chart-line"></i></a>
    <a class="nav-ico" href="meal_plans.html" title="Meal Plans"><i class="fa-solid fa-bowl-food"></i></a>
    <a class="nav-ico" href="nutrition.html" title="Nutrition"><i class="fa-solid fa-apple-whole"></i></a>
    <a class="nav-ico" href="schedule.html" title="Schedule"><i class="fa-solid fa-calendar-days"></i></a>
    <a class="nav-ico" href="subscription.html" title="Subscription"><i class="fa-solid fa-credit-card"></i></a>
    <a class="nav-ico" href="bmi.html" title="BMI"><i class="fa-solid fa-calculator"></i></a>
    <a class="nav-ico" href="feedback.html" title="Feedback"><i class="fa-solid fa-comment-dots"></i></a>

    <!-- ✅ active -->
    <a class="nav-ico active" href="notifications.html" title="Notifications"><i class="fa-regular fa-bell"></i></a>

    <div class="spacer"></div>

    <a class="nav-ico" href="../../index.html" title="Back to Website"><i class="fa-solid fa-globe"></i></a>
    <a class="nav-ico" href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a>
    <a class="nav-ico" href="#" id="btnLogout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a>
  </aside>

  <!-- MAIN -->
  <section class="main">
    <div class="content">

      <div class="top">
        <div class="hello">
          <h5>🔔 Notifications</h5>
          <p>Updates and messages for you</p>
        </div>

        <div class="d-flex align-items-center gap-2 flex-wrap">
          <a href="dashboard.html" class="btn btn-outline-dark btn-sm btn-pill">⬅ Back</a>
          <span class="pill">Unread: <span id="unreadCount">0</span></span>
          <button class="btn btn-sm btn-dark btn-pill" id="markAllBtn">Mark All Read</button>
        </div>
      </div>

      <div id="msg" class="mb-3 text-danger"></div>

      <div id="list" class="row g-3">
        <div class="col-12 text-center text-muted">Loading...</div>
      </div>

    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = {
  whoami: "../../backend/whoami.php",
  getNotifications: "../../backend/get_notifications.php",
  markRead: "../../backend/mark_notification_read.php",
  logout: "../../backend/logout.php"
};

function showMsg(t, ok=false){
  const el = document.getElementById("msg");
  el.className = ok ? "text-success mb-3" : "text-danger mb-3";
  el.textContent = t || "";
}

/* ✅ FAST UI: show saved name instantly (kept, even though icon sidebar doesn't show it) */
(function(){
  const saved = localStorage.getItem("loggedUserName");
  if(saved){
    const nav = document.getElementById("navUsername");
    if(nav) nav.textContent = saved;
  }
})();

async function authGuard(){
  try{
    const res = await fetch(API.whoami, { credentials:"same-origin" });
    const me = await res.json();

    if(!me.logged_in || (me.role||"").toLowerCase() !== "member"){
      window.location.href = "../../login.html";
      return null;
    }

    const displayName = (me.name || me.username || "Member").trim();

    const nav = document.getElementById("navUsername");
    if(nav) nav.textContent = displayName;

    localStorage.setItem("loggedUserName", displayName);
    localStorage.setItem("loggedUserRole", (me.role || "member").toLowerCase());

    return me;
  }catch(e){
    window.location.href = "../../login.html";
    return null;
  }
}

async function loadNotifications(){
  showMsg("");

  const res = await fetch(API.getNotifications, { credentials:"same-origin" });
  const data = await res.json();

  if(!data.ok){
    showMsg(data.message || "Failed to load notifications");
    return;
  }

  document.getElementById("unreadCount").textContent = data.unread ?? 0;

  const list = document.getElementById("list");
  list.innerHTML = "";

  if(!data.notifications || data.notifications.length === 0){
    list.innerHTML = `<div class="col-12"><div class="alert alert-info">No notifications</div></div>`;
    return;
  }

  data.notifications.forEach(n=>{
    const isRead = (n.is_read === 1);
    const dotColor = isRead ? "#9ca3af" : "#ef4444";
    const badge = isRead
      ? `<span class="badge bg-secondary">Read</span>`
      : `<span class="badge bg-danger">Unread</span>`;

    const btn = isRead
      ? `<button class="btn btn-sm btn-outline-secondary btn-pill" disabled>Marked</button>`
      : `<button class="btn btn-sm btn-dark btn-pill" data-id="${n.id}">Mark Read</button>`;

    list.innerHTML += `
      <div class="col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <span class="dot" style="background:${dotColor}"></span>
                <span class="fw-bold">${escapeHtml(n.title)}</span>
              </div>
              ${badge}
            </div>
            <div class="text-muted mt-2" style="white-space:pre-line">${escapeHtml(n.message)}</div>
            <div class="d-flex justify-content-between align-items-center mt-3">
              <div class="small text-muted">${n.created_at}</div>
              ${btn}
            </div>
          </div>
        </div>
      </div>
    `;
  });

  list.querySelectorAll("button[data-id]").forEach(b=>{
    b.addEventListener("click", async ()=>{
      const id = parseInt(b.dataset.id, 10);
      await markRead(id);
    });
  });
}

async function markRead(id){
  showMsg("");
  const res = await fetch(API.markRead,{
    method:"POST",
    credentials:"same-origin",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ id })
  });
  const data = await res.json();

  if(!data.ok){
    showMsg(data.message || "Failed");
    return;
  }
  showMsg("Marked as read ✅", true);
  await loadNotifications();
}

async function markAllRead(){
  showMsg("");
  const res = await fetch(API.markRead,{
    method:"POST",
    credentials:"same-origin",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ mark_all: 1 })
  });
  const data = await res.json();

  if(!data.ok){
    showMsg(data.message || "Failed");
    return;
  }
  showMsg("All marked as read ✅", true);
  await loadNotifications();
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

document.getElementById("markAllBtn").addEventListener("click", markAllRead);

/* ✅ Logout */
document.getElementById("btnLogout").addEventListener("click", async (e) => {
  e.preventDefault();
  try{
    await fetch(API.logout, { method:"POST", credentials:"same-origin" });
  }catch{}
  localStorage.removeItem("loggedUserName");
  localStorage.removeItem("loggedUserRole");
  window.location.href = "../../login.html";
});

/* ✅ init */
(async function(){
  const me = await authGuard();
  if(me) await loadNotifications();
})();
</script>

</body>
</html>
