<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>💪 Workouts | SMART FIT</title>

<!-- Bootstrap (optional, but safe to keep) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<!-- Font Awesome (same as dashboard) -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

<style>
  :root{
    --bg1:#c8f06b;
    --bg2:#b7ea5a;

    --sidebar:#111318;
    --sidebar2:#0c0e12;

    --panel:#ffffff;
    --card:#ffffff;

    --text:#0f172a;
    --muted:#6b7280;

    --green:#b8f14d;
    --green2:#7ee000;

    --line:#e5e7eb;
    --shadow: 0 18px 50px rgba(0,0,0,.18);

    --radius:18px;
  }

  *{ box-sizing:border-box; }

   body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height:100vh;
      background: url("../../assets/img/member-bg.jpg") center/cover no-repeat fixed;
      overflow:hidden;
    }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(circle at 20px 20px, rgba(255,255,255,.18) 2px, transparent 2px),
      radial-gradient(circle at 60px 60px, rgba(0,0,0,.05) 2px, transparent 2px);
    background-size: 80px 80px;
    opacity:.45;
    pointer-events:none;
  }

  .app{
    height:100vh;
    display:flex;
    padding: 22px;
    gap: 18px;
    position:relative;
    z-index:1;
  }

  /* Sidebar (dashboard style) */
  .sidebar{
    width: 88px;
    min-width:88px;
    background: linear-gradient(180deg, var(--sidebar), var(--sidebar2));
    border-radius: 26px;
    padding: 18px 12px;
    box-shadow: var(--shadow);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 14px;
  }

  .brand{
    width:44px;height:44px;border-radius:14px;
    display:grid;place-items:center;
    color: var(--green2);
    border:1px solid rgba(184,241,77,.35);
    background: rgba(255,255,255,.06);
    margin-bottom:4px;
  }

  .nav-ico{
    width:44px;height:44px;border-radius:16px;
    display:grid;place-items:center;
    color:#cbd5e1;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.05);
    cursor:pointer;
    transition:.18s ease;
    text-decoration:none;
  }
  .nav-ico:hover{
    transform: translateY(-1px);
    background: rgba(255,255,255,.08);
  }
  .nav-ico.active{
    background: linear-gradient(135deg, var(--green), var(--green2));
    color:#0b0f14;
    border-color: transparent;
  }

  .spacer{ flex:1; }

  /* Main panel */
  .main{
    flex:1;
    background: rgba(255,255,255,.58);
    border: 1px solid rgba(255,255,255,.6);
    backdrop-filter: blur(10px);
    border-radius: 26px;
    box-shadow: var(--shadow);
    padding: 18px;
    display:flex;
    gap: 16px;
    overflow:hidden;
  }

  .left{
    flex: 1;
    overflow:auto;
    padding-right: 6px;
  }
  .left::-webkit-scrollbar{ width:10px; }
  .left::-webkit-scrollbar-thumb{ background: rgba(15,23,42,.18); border-radius: 20px; }

  /* Top header (dashboard style) */
  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .hello h5{ margin:0; font-weight: 900; }
  .hello p{ margin:2px 0 0; color: var(--muted); font-size: 13px; }

  .pill{
    background:#fff;
    border:1px solid var(--line);
    border-radius: 999px;
    padding: 8px 12px;
    font-weight: 800;
    font-size: 13px;
    display:flex;
    align-items:center;
    gap: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,.08);
    user-select:none;
    white-space:nowrap;
  }

  /* panels / cards */
  .panel{
    background: var(--card);
    border:1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 12px 30px rgba(0,0,0,.08);
    padding: 14px;
    margin-bottom: 14px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap: 14px;
    margin-top: 10px;
  }

  .cardx{
    background:#fff;
    border-radius: 18px;
    padding: 16px;
    border:1px solid #eef2f7;
    box-shadow: 0 12px 30px rgba(0,0,0,.06);
  }

  .badgex{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 12px;
    font-weight: 900;
    color: #111827;
    white-space:nowrap;
    margin-bottom:10px;
  }

  .meta{
    display:flex;
    gap:16px;
    color:#475569;
    margin: 8px 0;
    font-weight: 800;
    font-size: 13px;
  }

  .state{
    margin:8px 0;
    font-weight: 900;
    color:#0f7a4b;
    min-height:20px;
  }

  .btn-green{
    background: linear-gradient(135deg, var(--green), var(--green2));
    border:none;
    color:#0b0f14;
    font-weight: 900;
    border-radius: 14px;
    padding: 10px 14px;
    width:100%;
    cursor:pointer;
  }

  .btn-soft{
    background:#fff;
    border:1px solid var(--line);
    color:#111827;
    font-weight: 900;
    border-radius: 14px;
    padding: 10px 14px;
    width:100%;
    cursor:pointer;
  }

  .btn-darklink{
    display:block;
    text-align:center;
    text-decoration:none;
    background:#111827;
    color:#fff;
    padding:10px 14px;
    border-radius:14px;
    font-weight:900;
    width:100%;
  }

  button:disabled{ opacity:.55; cursor:not-allowed; }

  .alertx{
    background:#fff;
    border:1px solid #eef2f7;
    padding:12px 14px;
    border-radius:14px;
    box-shadow: 0 12px 30px rgba(0,0,0,.06);
    margin: 12px 0;
    font-weight: 800;
    color:#111827;
  }

  .alertx.warn{
    background:#fff3cd;
    border-color:#ffeeba;
    color:#7a5a00;
  }

  .alertx.error{
    background:#ffe5e5;
    border-color:#ffbdbd;
    color:#7a0f0f;
  }
</style>
</head>

<body>
<div class="app">

  <!-- Sidebar (icon style like main dashboard) -->
  <aside class="sidebar">
    <div class="brand"><i class="fa-solid fa-dumbbell"></i></div>

    <a class="nav-ico" href="dashboard.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
    <a class="nav-ico active" href="workouts.html" title="Workouts"><i class="fa-solid fa-dumbbell"></i></a>
    <a class="nav-ico" href="myworkout.html" title="My Workouts"><i class="fa-solid fa-list-check"></i></a>
    <a class="nav-ico" href="progress.html" title="Progress"><i class="fa-solid fa-chart-line"></i></a>
    <a class="nav-ico" href="meal_plans.html" title="Meal Plans"><i class="fa-solid fa-bowl-food"></i></a>
    <a class="nav-ico" href="nutrition.html" title="Nutrition"><i class="fa-solid fa-apple-whole"></i></a>
    <a class="nav-ico" href="schedule.html" title="Schedule"><i class="fa-solid fa-calendar-days"></i></a>
    <a class="nav-ico" href="subscription.html" title="Subscription"><i class="fa-solid fa-credit-card"></i></a>

    <a class="nav-ico" href="bmi.html" title="BMI"><i class="fa-solid fa-calculator"></i></a>
    <a class="nav-ico" href="feedback.html" title="Feedback"><i class="fa-solid fa-comment-dots"></i></a>

    <div class="spacer"></div>

    <a class="nav-ico" href="../../index.html" title="Back to Website"><i class="fa-solid fa-globe"></i></a>
    <a class="nav-ico" href="notifications.html" title="Notifications"><i class="fa-regular fa-bell"></i></a>
    <a class="nav-ico" href="profile.html" title="Profile"><i class="fa-solid fa-user"></i></a>
    <a class="nav-ico" href="#" id="btnLogout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a>
  </aside>

  <!-- Main panel -->
  <section class="main">
    <div class="left">

      <div class="top">
        <div class="hello">
          <h5>💪 Workouts</h5>
          <p>Start and complete workouts</p>
        </div>

        <div class="pill" id="statusTop">⏳ Loading...</div>
      </div>

      <div id="msg"></div>
      <div class="grid" id="cards"></div>

    </div>
  </section>

</div>

<script>
/** IMPORTANT: keep relative to avoid SMART_FIT vs smart_fit issues */
const API_BASE = "../../backend";

const cardsEl = document.getElementById("cards");
const statusTop = document.getElementById("statusTop");
const msgEl = document.getElementById("msg");

function showMsg(text,type="warn"){
  if(!text){ msgEl.innerHTML=""; return; }
  msgEl.innerHTML = `<div class="alertx ${type}">${text}</div>`;
}

async function safeJson(res){
  const t = await res.text();
  try { return JSON.parse(t); } catch { return { ok:false, message:t }; }
}

function esc(s){
  return (s ?? "").toString()
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function setCardState(id,state){
  const stateEl=document.getElementById("state-"+id);
  const btnS=document.getElementById("start-"+id);
  const btnC=document.getElementById("complete-"+id);

  if(state==="started"){
    stateEl.textContent="▶️ Started";
    btnS.disabled=true;
  } else if(state==="completed"){
    stateEl.textContent="✅ Completed";
    btnS.disabled=true;
    btnC.disabled=true;
  } else {
    stateEl.textContent="";
    btnS.disabled=false;
    btnC.disabled=false;
  }
}

function renderCard(w){
  const yt = (w.youtube_url || "").trim();

  return `
  <div class="cardx">
    <div class="badgex"><i class="fa-solid fa-layer-group"></i> ${esc(w.level||"beginner")}</div>
    <h3 style="margin:0 0 8px;font-weight:900;">${esc(w.title||"Workout")}</h3>

    <div class="meta">
      <span>⏱ ${esc(w.duration_min||0)} mins</span>
      <span>🔥 ${esc(w.calories||0)} cal</span>
    </div>

    <div class="state" id="state-${w.id}"></div>

    <button class="btn-soft" id="start-${w.id}" onclick="startWorkout(${w.id})">▶️ Start</button>
    <div style="height:8px"></div>
    <button class="btn-green" id="complete-${w.id}" onclick="completeWorkout(${w.id})">✅ Complete</button>

    ${yt ? `<div style="height:10px"></div><a class="btn-darklink" href="${esc(yt)}" target="_blank">🎥 Watch Video</a>` : ``}
  </div>`;
}

async function loadWorkouts(){
  try{
    statusTop.textContent="⏳ Loading...";
    showMsg("");

    const res=await fetch(API_BASE+"/member_workouts.php", { credentials:"include" });
    const data=await safeJson(res);

    if(!data.ok){
      showMsg("❌ Failed to load workouts: " + (data.message||""), "error");
      statusTop.textContent="❌ Error";
      return;
    }

    const items=data.workouts||[];
    statusTop.textContent=`✅ Loaded ${items.length} workouts`;

    if(!items.length){
      cardsEl.innerHTML="<div class='alertx warn'>⚠️ No workouts found</div>";
      return;
    }

    cardsEl.innerHTML=items.map(renderCard).join("");
  }catch(e){
    showMsg("❌ Network error", "error");
    statusTop.textContent="❌ Error";
  }
}

async function startWorkout(id){
  try{
    setCardState(id,"started");
    const fd=new FormData();
    fd.append("workout_id",id);

    const res = await fetch(API_BASE+"/start_workout.php", { method:"POST", body:fd, credentials:"include" });
    const data = await safeJson(res);

    if(!data.ok){
      setCardState(id,"");
      showMsg("❌ Start failed: " + (data.message||"Error"), "error");
      return;
    }
    showMsg("✅ Started!", "warn");
  }catch(e){
    setCardState(id,"");
    showMsg("❌ Start failed (network)", "error");
  }
}

async function completeWorkout(id){
  try{
    setCardState(id,"completed");
    const fd=new FormData();
    fd.append("workout_id",id);

    const res = await fetch(API_BASE+"/complete_workout.php", { method:"POST", body:fd, credentials:"include" });
    const data = await safeJson(res);

    if(!data.ok){
      setCardState(id,"started");
      showMsg("❌ Complete failed: " + (data.message||"Error"), "error");
      return;
    }
    showMsg("✅ Completed!", "warn");
  }catch(e){
    showMsg("❌ Complete failed (network)", "error");
  }
}

document.getElementById("btnLogout").addEventListener("click", async (e)=>{
  e.preventDefault();
  await fetch(API_BASE+"/logout.php", { method:"POST", credentials:"include" });
  window.location.href="../../index.html";
});

loadWorkouts();
</script>

</body>
</html>
