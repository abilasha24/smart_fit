<script src="trainer_layout.js"></script>

<script>
  // ✅ renamed to avoid conflict with trainer_layout.js
  const N_BASE = "../../";
  const N_API  = N_BASE + "backend/";

  const listEl    = document.getElementById("list");
  const unreadEl  = document.getElementById("unreadCount");
  const navBadge  = document.getElementById("navNotifBadge");
  const btnAll    = document.getElementById("btnMarkAll");
  const loadingEl = document.getElementById("loadingText");
  const msgEl     = document.getElementById("msg");

  function esc(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function setLoading(text){
    loadingEl.textContent = text || "Loading...";
    loadingEl.style.display = "block";
  }
  function hideLoading(){
    loadingEl.style.display = "none";
  }
  function showMsg(type, text){
    msgEl.innerHTML = `<div class="alert alert-${type}">${esc(text)}</div>`;
  }
  function setBadge(n){
    if(!navBadge) return;
    navBadge.textContent = n;
    navBadge.style.display = (n > 0) ? "inline-block" : "none";
  }

  function render(items){
    listEl.innerHTML = "";
    if(!items || items.length === 0){
      listEl.innerHTML = `<div class="card-soft p-3">No notifications</div>`;
      return;
    }

    items.forEach(n=>{
      const isRead = Number(n.is_read) === 1;
      const tag = isRead ? "" : `<span class="badge text-bg-warning ms-2">NEW</span>`;

      listEl.insertAdjacentHTML("beforeend", `
        <div class="card-soft p-3 mb-2">
          <div class="d-flex justify-content-between align-items-start gap-2">
            <div>
              <div class="fw-bold">${esc(n.title)}${tag}</div>
              <div class="subtitle">${esc(n.message)}</div>
              <div class="text-muted small mt-1">${esc(n.created_at)}</div>
            </div>
            ${isRead ? "" : `<button class="btn btn-sm btn-outline-dark btn-pill" data-id="${n.id}">Mark Read</button>`}
          </div>
        </div>
      `);
    });

    listEl.querySelectorAll("button[data-id]").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const id = btn.getAttribute("data-id");
        await fetch(N_API+"trainer_notifications_mark_read.php", {
          method:"POST",
          credentials:"include",
          headers: {"Content-Type":"application/x-www-form-urlencoded"},
          body: "id="+encodeURIComponent(id)
        });
        load();
      });
    });
  }

  async function load(){
    msgEl.innerHTML = "";
    setLoading("Loading...");

    let r;
    try{
      r = await fetch(N_API+"trainer_notifications_list.php?limit=80", { credentials:"include" });
    }catch(e){
      setLoading("Fetch failed");
      showMsg("danger", "Fetch failed. Check backend path: " + N_API);
      return;
    }

    if(!r.ok){
      const t = await r.text().catch(()=> "");
      setLoading("HTTP Error: " + r.status);
      showMsg("danger", "HTTP " + r.status + " from API. " + (t.slice(0,200) || ""));
      return;
    }

    const d = await r.json().catch(()=>({ok:false, message:"Invalid JSON"}));
    if(!d.ok){
      setLoading("Load failed");
      showMsg("danger", d.message || "Load failed");
      return;
    }

    const unread = Number(d.unread || 0);
    unreadEl.textContent = unread;
    setBadge(unread);

    hideLoading();
    render(d.items || []);
  }

  btnAll.addEventListener("click", async ()=>{
    await fetch(N_API+"trainer_notifications_mark_all_read.php", {
      method:"POST",
      credentials:"include"
    });
    load();
  });

  load();
</script>
