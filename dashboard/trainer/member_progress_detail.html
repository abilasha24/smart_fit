<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Member Progress Details</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body{ background:#f6f7fb; }
    .card-soft{
      background:#fff;border:1px solid #e5e7eb;border-radius:18px;
      box-shadow:0 10px 22px rgba(15,23,42,.06);
    }
    .subtitle{ color:#6b7280; }
    .badge-pill{ border-radius:999px; }
    .btn-pill{ border-radius:999px; }
  </style>
</head>
<body>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
    <div>
      <h3 class="mb-1"><i class="bi bi-person-check me-2"></i>Member Progress Details</h3>
      <div class="subtitle" id="memberMeta">Loading...</div>
    </div>
    <a class="btn btn-outline-dark btn-pill" href="member_progress.html">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>

  <div class="card-soft p-3 mb-3">
    <div class="row g-3">
      <div class="col-md-4">
        <div class="subtitle">Started</div>
        <div class="fs-4 fw-bold" id="startedCount">-</div>
      </div>
      <div class="col-md-4">
        <div class="subtitle">Completed</div>
        <div class="fs-4 fw-bold" id="completedCount">-</div>
      </div>
      <div class="col-md-4">
        <div class="subtitle">Last Activity</div>
        <div class="fs-6 fw-semibold" id="lastActivity">-</div>
      </div>
    </div>
  </div>

  <div class="card-soft p-3">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
      <h5 class="mb-0">Workout History</h5>
      <span class="badge text-bg-dark badge-pill" id="totalRows">0</span>
    </div>

    <div class="table-responsive">
      <table class="table table-sm align-middle mb-0">
        <thead>
          <tr>
            <th>Date</th>
            <th>Workout</th>
            <th>Status</th>
            <th class="text-end">Duration (min)</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="4" class="subtitle">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const BASE = "../../";
  const API  = BASE + "backend/";

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function qs(key){
    return new URLSearchParams(location.search).get(key);
  }

  function fmtDate(v){
    if(!v) return "-";
    return String(v).replace(" ", " • ");
  }

  async function guardTrainer(){
    const r = await fetch(API+"check_auth.php", { credentials:"include" });
    if(r.status === 401) return location.href = BASE+"login.html";
    const data = await r.json().catch(()=> ({}));
    if((data.role||"") !== "trainer"){
      location.href = BASE+"login.html";
    }
  }

  async function load(){
    const user_id = qs("user_id");
    if(!user_id){
      document.getElementById("rows").innerHTML =
        `<tr><td colspan="4" class="text-danger">Missing user_id</td></tr>`;
      return;
    }

    // ✅ Backend API exists in your folder:
    const url = API + "trainer_member_progress_detail.php?user_id=" + encodeURIComponent(user_id);

    const r = await fetch(url, { credentials:"include" }).catch(()=>null);
    if(!r){
      document.getElementById("rows").innerHTML =
        `<tr><td colspan="4" class="text-danger">API not reachable</td></tr>`;
      return;
    }

    const d = await r.json().catch(()=>({ok:false}));
    if(!d.ok){
      document.getElementById("rows").innerHTML =
        `<tr><td colspan="4" class="text-danger">${esc(d.message||"Failed to load details")}</td></tr>`;
      return;
    }

    // Expected structure (if your PHP returns different keys, tell me; I'll adapt)
    const member = d.member || {};
    const items  = d.items || d.rows || [];

    document.getElementById("memberMeta").textContent =
      `${member.name || "Member"} • ${member.email || ""}`.trim();

    document.getElementById("startedCount").textContent   = member.started ?? d.started ?? "-";
    document.getElementById("completedCount").textContent = member.completed ?? d.completed ?? "-";
    document.getElementById("lastActivity").textContent   = fmtDate(member.last_activity ?? d.last_activity);

    document.getElementById("totalRows").textContent = items.length;

    if(items.length === 0){
      document.getElementById("rows").innerHTML =
        `<tr><td colspan="4" class="subtitle">No workout history</td></tr>`;
      return;
    }

    document.getElementById("rows").innerHTML = items.map(it => `
      <tr>
        <td class="subtitle">${esc(it.workout_date || it.date || "-")}</td>
        <td class="fw-semibold">${esc(it.title || it.workout_title || it.workout || "-")}</td>
        <td>
          <span class="badge ${String(it.status).toLowerCase()==="completed" ? "text-bg-success" : "text-bg-warning"} badge-pill">
            ${esc(it.status || "-")}
          </span>
        </td>
        <td class="text-end">${esc(it.duration_min ?? it.duration ?? "-")}</td>
      </tr>
    `).join("");
  }

  (async()=>{
    await guardTrainer();
    load();
  })();
</script>
</body>
</html>
