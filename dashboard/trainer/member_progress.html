<script src="trainer_layout.js"></script>
<script>
  const API_BASE = (window.API && typeof window.API === "string" && window.API.trim() !== "")
    ? window.API
    : "/SMART_FIT/backend/";

  const q = document.getElementById("q");
  const rows = document.getElementById("rows");
  const btnSearch = document.getElementById("btnSearch");
  const btnReload = document.getElementById("btnReload");

  function esc(s){
    return String(s??"")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function pill(n, type){
    const num = Number(n || 0);
    const cls = type==="ok" ? "text-bg-success"
      : type==="warn" ? "text-bg-warning text-dark"
      : "text-bg-secondary";
    return `<span class="badge ${cls} badge-pill">${num}</span>`;
  }

  async function safeJson(res){
    const txt = await res.text();
    try { return JSON.parse(txt); }
    catch {
      console.error("Invalid JSON:", txt);
      return { ok:false, message:"Invalid JSON from server" };
    }
  }

  async function load(){
    rows.innerHTML = `<tr><td colspan="5" class="subtitle">Loading...</td></tr>`;

    const params = new URLSearchParams();
    if(q.value.trim()) params.set("q", q.value.trim());

    const url = API_BASE + "trainer_member_progress_list.php" + (params.toString()?("?"+params.toString()):"");
    const r = await fetch(url, { credentials:"include" }).catch(()=>null);

    if(!r){
      rows.innerHTML = `<tr><td colspan="5" class="text-danger">API not reachable</td></tr>`;
      return;
    }

    const d = await safeJson(r);

    if(!d.ok){
      rows.innerHTML = `<tr><td colspan="5" class="text-danger">${esc(d.message || "Failed")}</td></tr>`;
      return;
    }

    const items = d.items || [];
    if(!items.length){
      rows.innerHTML = `<tr><td colspan="5" class="subtitle">No members</td></tr>`;
      return;
    }

    rows.innerHTML = items.map(it=>{
      const uid = it.user_id || it.id || "";
      return `
        <tr>
          <td class="fw-bold">${esc(it.name || it.member_name || it.username || "Member")}</td>
          <td class="subtitle">${esc(it.email || "")}</td>
          <td>${pill(it.started || 0, "warn")}</td>
          <td>${pill(it.completed || 0, "ok")}</td>
          <td>
            <a class="btn btn-sm btn-outline-dark btn-pill"
               href="member_progress_detail.html?user_id=${encodeURIComponent(uid)}">
              <i class="bi bi-eye me-1"></i>Details
            </a>
          </td>
        </tr>
      `;
    }).join("");
  }

  btnSearch.addEventListener("click", load);
  btnReload.addEventListener("click", ()=>{ q.value=""; load(); });
  q.addEventListener("keydown", (e)=>{ if(e.key==="Enter") load(); });

  document.getElementById("btnLogout").addEventListener("click",(e)=>{ e.preventDefault(); doLogout(); });

  (async()=>{
    await guardTrainer(); // trainer_layout.js
    load();
  })();
</script>
</body>
